name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install uv pytest
          uv sync

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Run tests (if exist)
        run: |
          if [ -d "tests" ]; then
            echo "Running tests..."
            uv run pytest -v
          else
            echo "No tests found, skipping..."
          fi
